name: phaseflow
channels:
  - pytorch
  - conda-forge
  - defaults

dependencies:
  - python=3.10
  - pytorch>=2.0.0
  - pytorch-cuda=11.8  # 根据你的 CUDA 版本调整
  - numpy>=1.21.0
  - pandas>=1.3.0
  - pyyaml>=6.0
  - tqdm>=4.64.0
  - scipy>=1.7.0
  - matplotlib>=3.5.0

  # pip 安装的包
  - pip
  - pip:
    - einops>=0.6.0
    - rotary-embedding-torch>=0.8.4
    - torchdiffeq
    - jaxtyping
    - beartype
    - typing-extensions>=4.0.0
